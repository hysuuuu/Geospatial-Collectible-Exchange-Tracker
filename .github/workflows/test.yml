name: Unit Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore "Geospatial Collectible Exchange Tracker.sln"

      - name: Build
        run: dotnet build "Geospatial Collectible Exchange Tracker.sln" --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test "Geospatial Collectible Exchange Tracker.sln" --configuration Release --no-build --verbosity normal
